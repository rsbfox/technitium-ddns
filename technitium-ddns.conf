# /etc/technitium-ddns/technitium-ddns.conf
#
# Configuration for technitium-ddns.
# This file is sourced as bash so standard shell syntax applies.
# Must be owned by root:root with permissions 640.
#
# Zone config files live in subdirectories alongside this file:
#   /etc/technitium-ddns/your.domain/records.conf

# WAN interface — your public-facing network interface (e.g. bond0, eth0)
WAN_IFACE=""

# LAN interface — your local network interface (e.g. enp2s0f2, eth1)
LAN_IFACE=""

# Technitium DNS Server API base URL
TECH_API_BASE="http://localhost:5380/api"

# Technitium API token — generate in the web UI under your username -> API Tokens
TECH_TOKEN=""

# FreeDNS v2 randomized update tokens (https://freedns.afraid.org/dynamic/v2/)
# One token updates all linked records if "Link updates of same IP together" is ON
# Comma separated for multiple tokens. Uncomment to enable.
# FREEDNS_KEYS=""
